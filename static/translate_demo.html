<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Translator Demo</title>
  <style>
    body{font-family:Inter,Segoe UI,Arial,sans-serif;background:#0f172a;color:#e6eef8;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px}
    .card{background:linear-gradient(180deg,rgba(255,255,255,0.03),rgba(255,255,255,0.02));padding:20px;border-radius:12px;box-shadow:0 8px 30px rgba(2,6,23,0.6);width:100%;max-width:720px}
    h1{margin:0 0 10px 0;font-size:1.4rem}
    .row{display:flex;gap:10px;margin-bottom:12px}
    select,input[type=text],textarea{flex:1;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);color:inherit}
    textarea{min-height:80px}
    button{background:#06b6d4;color:#042a2b;border:none;padding:10px 14px;border-radius:8px;cursor:pointer;font-weight:600}
    .result{margin-top:14px;background:rgba(255,255,255,0.02);padding:14px;border-radius:8px;min-height:48px}
    .output-chars{font-size:1.6rem;word-break:break-word;margin-bottom:8px}
    .meta{font-family:monospace;font-size:0.85rem;color:#cfeef8}
    .controls{display:flex;gap:8px;margin-top:8px}
  </style>
</head>
<body>
  <div class="card">
    <h1>Translator Demo</h1>
    <form id="frm">
      <div class="row">
        <label style="display:flex;flex:1;gap:8px;align-items:center">Target
          <select name="target">
            <option value="morse">Morse</option>
            <option value="jawa">Aksara Jawa</option>
            <option value="bali">Aksara Bali</option>
            <option value="sunda">Aksara Sunda</option>
            <option value="minang">Aksara Minang</option>
            <option value="malay">Aksara Malay</option>
            <option value="batak">Aksara Batak</option>
            <option value="bugis">Aksara Bugis</option>
          </select>
        </label>
        <button type="submit">Translate</button>
      </div>
      <div style="margin-bottom:6px">Text to translate</div>
      <div>
        <textarea name="text">salam</textarea>
      </div>
    </form>

    <div class="result" id="result">
      <div class="output-chars" id="outChars">—</div>
      <div class="meta" id="outMeta">Status: idle</div>
      <!-- controls removed: copy/raw JSON buttons -->
    </div>
  </div>

  <script>
    const frm = document.getElementById('frm');
    const outChars = document.getElementById('outChars');
    const outMeta = document.getElementById('outMeta');
    // raw/copy controls removed; guard variables in case older markup remains
    const rawPre = document.getElementById('raw');

    frm.addEventListener('submit', async (e)=>{
      e.preventDefault();
      const fd = new FormData(frm);
      const data = { target: fd.get('target'), text: fd.get('text') };
      outMeta.textContent = 'Translating...';
      outChars.textContent = '';
      if (rawPre) rawPre.style.display = 'none';
      try {
        const res = await fetch('/translator/translate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
        const j = await res.json();
        const out = j.output ?? j.data ?? j;
        // show characters and codepoints
        const str = typeof out === 'string' ? out : JSON.stringify(out);
        outChars.textContent = str || '—';
        const cps = Array.from(str).map(ch=>`U+${ch.codePointAt(0).toString(16).toUpperCase().padStart(4,'0')}`).join(' ');
        outMeta.textContent = `Status: ${j.status||res.status} — codepoints: ${cps}`;
        if (rawPre) rawPre.textContent = JSON.stringify(j,null,2);
      } catch (err) {
        outMeta.textContent = 'Error: ' + (err.message || err);
        outChars.textContent = '—';
        if (rawPre) rawPre.textContent = err.stack || String(err);
        if (rawPre) rawPre.style.display = 'block';
      }
    });

    // copy/raw controls removed
  </script>
</body>
</html>
